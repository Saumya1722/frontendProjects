<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic item list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Dynamic Item Editor</h1>
        <div id="input-group">
            <input type="text" placeholder="Add an item ..." id="new-item-input">
            <button id="add-item-btn">Add Item</button>
        </div>

        <ul id="item-list">
            <li class="item">
                Bread
                <button class="remove-btn">Remove</button>
            </li>
            <li class="item">
                Milk
                <button class="remove-btn">Remove</button>
            </li>
        </ul>
    </div>


    <script src="index.js"></script>
</body>
</html>
