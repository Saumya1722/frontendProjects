<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Bookmark Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Dynamic Bookmark Manager</h1>

    <form id="bookmarkForm">
      <input type="text" id="bookmarkTitle" placeholder="Enter Bookmark Title" required />
      <input type="url" id="bookmarkURL" placeholder="Enter Bookmark URL" required />
      <button type="submit">Add Bookmark</button>
    </form>

    <ul id="bookmarkList" class="bookmark-list"></ul>
  </div>

  <script src="index.js"></script>
</body>
</html>
