<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker</title>
    <link rel="stylesheet" href="style.css" class="css">
</head>
<body>
    <h1>Data Attribute Color Picker</h1>

    <div id="color-display">
        Click the color patches below and change the background color of display
    </div>
    
    <div id="color-options">
        <button data-color="lightblue">Light blue</button>
        <button data-color="lightgreen">Light green</button>
        <button data-color="lightpink">Light pink</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
