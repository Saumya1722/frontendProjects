<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Mailbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Priority Mailbox</h1>

        <div class="controls">
            <button id="insert-btn"  class="btn btn-insert">1. Queue New Urgent Message (insertBefore)</button>
            <button id="replace-btn" class="btn btn-replace">2. Send Draft Message (replaceChild)</button>
        </div>

        <ul id="message-list">
            
            <li id="msg1" class="msg status-received"><span>From: Alice</span>- Report ready</li>
            <li id="msg2" class="msg status-draft"><span>To: Bob</span>- Project Draft</li>
            <li id="msg3" class="msg status-received"><span>From: Charlie</span>- Weekly update</li>
            
        </ul>
    </div>

    <script src="index.js"></script>
</body>
</html>
